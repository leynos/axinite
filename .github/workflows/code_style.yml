---
name: Code Style
"on":
  pull_request:

jobs:
  format:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: make check-fmt

  lint:
    name: Lint
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: clang
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: >-
        -C link-arg=-fuse-ld=mold
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install mold
        uses: rui314/setup-mold@v1
      - uses: Swatinem/rust-cache@v2
        with:
          key: lint
      # Whitaker is disabled for now until the current lint backlog is reduced.
      - name: Check lints
        run: make lint

  clippy-windows:
    name: Clippy Windows (${{ matrix.name }})
    if: github.base_ref == 'main'
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: all-features
            flags: "--all-features"
          - name: default
            flags: ""
          - name: libsql-only
            flags: "--no-default-features --features libsql"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: clippy-windows-${{ matrix.name }}
      - name: Check lints
        run: >-
          cargo clippy --all --benches --tests --examples ${{ matrix.flags }}
          -- -D warnings

  # Roll-up job for branch protection
  code-style:
    name: Code Style (fmt + lint)
    runs-on: ubuntu-latest
    if: always()
    needs: [format, lint, clippy-windows]
    steps:
      - run: |
          if [[ "${{ needs.format.result }}" != "success" || \
            "${{ needs.lint.result }}" != "success" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          # clippy-windows only runs on main PRs.
          # Skip and success are both acceptable.
          if [[ "${{ needs.clippy-windows.result }}" == "failure" ]]; then
            echo "Windows clippy failed"
            exit 1
          fi
