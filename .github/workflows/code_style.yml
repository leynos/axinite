---
name: Code Style
"on":
  pull_request:

jobs:
  format:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          python-version: '3.13'
          enable-cache: true
      - name: Workflow contract tests
        run: make test-workflow-contracts

  clippy:
    name: Clippy (${{ matrix.name }})
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: clang
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: >-
        -C link-arg=-fuse-ld=mold
      WHITAKER_INSTALLER_VERSION: '0.2.5'
      # The suite's default toolchain (nightly-2025-09-18) predates rustc
      # 1.93, which wasmtime 45 requires, so the installer builds the suite
      # against a late 1.93-cycle nightly instead.
      WHITAKER_TOOLCHAIN: nightly-2025-12-10
    strategy:
      fail-fast: false
      matrix:
        include:
          # Whitaker lints under its own pinned toolchain, so re-running it
          # per matrix leg repeats identical work; it runs on the
          # all-features leg only.
          - name: all-features
            flags: "--all-features"
            whitaker: true
          - name: default
            flags: ""
          - name: libsql-only
            flags: "--no-default-features --features libsql"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install mold
        uses: rui314/setup-mold@v1
      - uses: Swatinem/rust-cache@v2
        with:
          key: clippy-${{ matrix.name }}
      - name: Check lints
        run: >-
          cargo clippy --all --benches --tests --examples ${{ matrix.flags }}
          -- -D warnings
      - name: Cache Whitaker installer
        if: matrix.whitaker
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: |
            ~/.cargo/bin/whitaker-installer
            ~/.cache/cargo-binstall
          key: whitaker-installer-${{ runner.os }}-${{ runner.arch }}-${{ env.WHITAKER_INSTALLER_VERSION }}
      - name: Install Whitaker
        if: matrix.whitaker
        run: |
          if ! command -v whitaker-installer >/dev/null 2>&1; then
            if cargo binstall --version >/dev/null 2>&1; then
              cargo binstall --no-confirm --locked "whitaker-installer@${WHITAKER_INSTALLER_VERSION}"
            else
              echo "cargo-binstall unavailable; building whitaker-installer from crates.io"
              cargo install --locked whitaker-installer --version "${WHITAKER_INSTALLER_VERSION}"
            fi
          fi
          whitaker-installer --toolchain "${WHITAKER_TOOLCHAIN}"
      - name: Whitaker Dylint suite
        if: matrix.whitaker
        run: make lint-whitaker

  clippy-windows:
    name: Clippy Windows (${{ matrix.name }})
    if: github.base_ref == 'main'
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: all-features
            flags: "--all-features"
          - name: default
            flags: ""
          - name: libsql-only
            flags: "--no-default-features --features libsql"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: clippy-windows-${{ matrix.name }}
      - name: Check lints
        run: >-
          cargo clippy --all --benches --tests --examples ${{ matrix.flags }}
          -- -D warnings

  # Roll-up job for branch protection
  code-style:
    name: Code Style (fmt + clippy)
    runs-on: ubuntu-latest
    if: always()
    needs: [format, clippy, clippy-windows]
    steps:
      - run: |
          if [[ "${{ needs.format.result }}" != "success" || \
            "${{ needs.clippy.result }}" != "success" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          # clippy-windows only runs on main PRs.
          # Skip and success are both acceptable.
          if [[ "${{ needs.clippy-windows.result }}" == "failure" ]]; then
            echo "Windows clippy failed"
            exit 1
          fi
