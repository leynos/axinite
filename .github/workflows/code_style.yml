---
name: Code Style
"on":
  pull_request:

jobs:
  format:
    name: Formatting
    runs-on: ubuntu-latest
    env:
      MERMAN_CLI_VERSION: '0.7.0'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          python-version: '3.14'
          enable-cache: true
      - name: Set up Rust for Merman
        run: rustup toolchain install 1.95.0 --profile minimal
      - name: Cache Merman CLI
        id: cache-merman-cli
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: ~/.cargo/bin/merman-cli
          key: merman-cli-${{ runner.os }}-${{ runner.arch }}-${{ env.MERMAN_CLI_VERSION }}
      - name: Install Merman CLI
        if: steps.cache-merman-cli.outputs.cache-hit != 'true'
        run: cargo +1.95.0 install merman-cli --version "=${MERMAN_CLI_VERSION}" --locked
      - name: Install Nixie
        run: uv tool install --python 3.14 nixie-cli==1.1.0
      - name: Enforce en-GB-oxendict spelling
        run: make spelling
      - name: Validate Mermaid diagrams
        run: make nixie
      - name: Workflow contract tests
        run: make test-workflow-contracts

  clippy:
    name: Clippy (${{ matrix.name }})
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: clang
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: >-
        -C link-arg=-fuse-ld=mold
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: all-features
            flags: "--all-features"
          - name: default
            flags: ""
          - name: libsql-only
            flags: "--no-default-features --features libsql"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install mold
        uses: rui314/setup-mold@v1
      - uses: Swatinem/rust-cache@v2
        with:
          key: clippy-${{ matrix.name }}
      - name: Check lints
        run: >-
          cargo clippy --all --benches --tests --examples ${{ matrix.flags }}
          -- -D warnings

  clippy-windows:
    name: Clippy Windows (${{ matrix.name }})
    if: github.base_ref == 'main'
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: all-features
            flags: "--all-features"
          - name: default
            flags: ""
          - name: libsql-only
            flags: "--no-default-features --features libsql"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: clippy-windows-${{ matrix.name }}
      - name: Check lints
        run: >-
          cargo clippy --all --benches --tests --examples ${{ matrix.flags }}
          -- -D warnings

  # Roll-up job for branch protection
  code-style:
    name: Code Style (fmt + clippy)
    runs-on: ubuntu-latest
    if: always()
    needs: [format, clippy, clippy-windows]
    steps:
      - run: |
          if [[ "${{ needs.format.result }}" != "success" || \
            "${{ needs.clippy.result }}" != "success" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          # clippy-windows only runs on main PRs.
          # Skip and success are both acceptable.
          if [[ "${{ needs.clippy-windows.result }}" == "failure" ]]; then
            echo "Windows clippy failed"
            exit 1
          fi
