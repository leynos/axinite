---
name: CodeScene Coverage Check
"on":
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  coverage-check:
    name: CodeScene Coverage
    if: github.event_name == 'pull_request'
    runs-on: ubicloud-standard-8
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: clang
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: >-
        -C link-arg=-fuse-ld=mold
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: false

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
          targets: wasm32-wasip2

      - name: Install clang
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Install mold
        uses: rui314/setup-mold@v1

      - uses: Swatinem/rust-cache@v2
        with:
          key: coverage-libsql-only

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest

      - name: Install cargo-component
        uses: taiki-e/install-action@v2.83.0
        with:
          tool: cargo-component

      - name: Build GitHub WASM tool (for metadata/schema tests)
        run: make build-github-tool-wasm

      - name: Build WASM channels (for integration tests)
        run: ./scripts/build-wasm-extensions.sh --channels

      - name: Generate coverage
        run: >-
          cargo llvm-cov nextest --no-default-features --features libsql
          --features test-helpers --workspace --lcov
          --output-path lcov.info

      - name: Check coverage against CodeScene gates
        env:
          CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
        if: github.event_name == 'pull_request' && env.CS_ACCESS_TOKEN != ''
        uses: leynos/shared-actions/.github/actions/upload-codescene-coverage@e0d9b652b137eb15314fff188f09e1ba18d3cc5b
        with:
          format: lcov
          mode: check
          project-url: https://api.codescene.io/v2/projects/77987
          access-token: ${{ env.CS_ACCESS_TOKEN }}
          installer-checksum: ${{ vars.CODESCENE_CLI_SHA256 }}

      - name: Trim build artefacts before cache save
        if: always()
        run: |
          rm -rf target/debug/incremental
          rm -rf target/debug/.fingerprint
          cargo clean --doc 2>/dev/null || true
          find target -name "*.d" -delete 2>/dev/null || true
