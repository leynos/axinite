name: "PR: Scope Labels"

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  scope:
    runs-on: ubicloud-standard-8
    steps:
      - uses: actions/labeler@v6
        with:
          configuration-path: .github/labeler.yml
          sync-labels: false          # additive only — never remove scope labels
